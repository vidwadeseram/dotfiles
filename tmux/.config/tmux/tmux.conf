set -g allow-passthrough on
set -g mouse on

# Allow nested tmux sessions - unset TMUX check
set-option -g detach-on-destroy off

# Nested tmux session support
# Default prefix: Ctrl-b (for outer session)
# Nested prefix: Ctrl-a (for inner session)

# Send prefix to nested session with Ctrl-b a
bind-key a send-prefix

# Alternative: Use Ctrl-a as prefix for nested sessions
# Press Ctrl-b Ctrl-a to toggle between outer/inner control
bind-key C-a set-option -g prefix C-a \; \
         set-option -g prefix2 C-b \; \
         display-message "Prefix: C-a (nested mode)"

bind-key C-b set-option -g prefix C-b \; \
         set-option -g prefix2 None \; \
         display-message "Prefix: C-b (normal mode)"

# Visual indicator for nested session
# Dim status bar colors when in nested mode
bind -T root F12 \
  set prefix None \; \
  set key-table off \; \
  set status-style "fg=colour245,bg=colour238" \; \
  if -F "#{pane_in_mode}" "send-keys -X cancel" \; \
  display-message "Nested mode ON (F12 to exit)" \; \
  refresh-client -S

bind -T off F12 \
  set -u prefix \; \
  set -u key-table \; \
  set -u status-style \; \
  display-message "Nested mode OFF" \; \
  refresh-client -S
